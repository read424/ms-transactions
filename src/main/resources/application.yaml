spring:
  application:
    name: ms-transaction
  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://localhost:8888}
  cloud:
    config:
      enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ms-transaction-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    mongodb:
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ms-transaction
      environment: development
  endpoint:
    health:
      show-details: always
      show-components: always
      validate-group-membership: false
      group:
        circuit-breaker:
          include: circuitBreakerHealth
        readiness:
          include: kafka
    prometheus:
      enabled: true
  health:
    circuitbreaker:
      enabled: true
    diskspace:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      account-validation:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
  timelimiter:
    instances:
      account-validation:
        cancelRunningFuture: true
        timeoutDuration: 2s
  retry:
    instances:
      account-validation:
        maxAttempts: 3
        waitDuration: 1000
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

account-service:
  url: http://ms-account

credit-service:
  url: http://ms-credits

kafka:
  topics:
    transaction-deposit-completed: transaction.deposit.completed
    transaction-withdrawal-completed: transaction.withdrawal.completed
    transaction-transfer-completed: transaction.transfer.completed
    transaction-credit-payment-completed: transaction.credit.payment.completed
